<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Quotes</title>
<style>
  :root { --accent: #000000; }
  html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; }
  #card {
    box-sizing: border-box;
    width: 100vw; height: 100vh;
    padding: 17vmin 9vmin 8vmin 9vmin;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: Georgia, "Times New Roman", serif;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }
  #icon { position: absolute; top: 6vmin; left: 7vmin; width: 11vmin; height: 11vmin; }
  #icon svg { width: 100%; height: 100%; fill: var(--accent); }
  #quote { text-align: center; color: #000; line-height: 1.32; }
  #author { margin-top: 1.1em; font-style: italic; color: #464646; text-align: center; }
  #title { text-align: center; font-weight: bold; color: #000; line-height: 1.2; margin-bottom: 0.5em; }
  #title:empty { display: none; }
  #card.poem #content { width: 100%; }
  #card.poem #quote, #card.poem #title, #card.poem #author { text-align: left; }
  #comic { display: none; box-sizing: border-box; width: 100vw; height: 100vh; padding: 28px; background: #fff; flex-direction: column; justify-content: center; align-items: center; }
  #comicImg { max-width: 100%; max-height: 92%; object-fit: contain; }
  #comicSrc { margin-top: 10px; font-family: Georgia, serif; font-size: 14px; color: #000; text-align: center; }
</style>
</head>
<body>
  <div id="card">
    <div id="icon"></div>
    <div id="content">
      <div id="title"></div>
      <div id="quote"></div>
      <div id="author"></div>
    </div>
  </div>
  <div id="comic"><img id="comicImg" alt=""><div id="comicSrc"></div></div>
<script src="quotes.js"></script>
<script src="poems.js"></script>
<script src="comics.js"></script>
<script>
  var DATA = (window.QUOTES || []);
  var POEMS = (window.POEMS || []);
  function pick() {
    var n = DATA.length;
    // rotate by time so consecutive refreshes differ, with a shuffle offset
    var idx = Math.floor(Math.random() * n);
    return DATA[idx];
  }
  function render() {
    var item = pick();
    document.getElementById("card").classList.remove("poem");
    document.getElementById("icon").innerHTML = item.i;
    document.getElementById("title").innerHTML = "";
    document.getElementById("quote").innerHTML = item.q;
    document.getElementById("author").innerHTML = "\u2014 " + item.a;
    fit();
  }
  function renderPoem() {
    var p = POEMS[Math.floor(Math.random() * POEMS.length)];
    document.getElementById("card").classList.add("poem");
    document.getElementById("icon").innerHTML = p.i || "";
    document.getElementById("title").innerHTML = p.t || "";
    document.getElementById("quote").innerHTML = p.lines;
    document.getElementById("author").innerHTML = p.a ? ("\u2014 " + p.a) : "";
    fit();
  }
  function setSize(q, a, px) {
    q.style.fontSize = px + "px";
    a.style.fontSize = Math.max(13, Math.round(px * 0.6)) + "px";
    document.getElementById("title").style.fontSize = Math.round(px * 1.1) + "px";
  }
  function fit() {
    var card = document.getElementById("card");
    var q = document.getElementById("quote");
    var a = document.getElementById("author");
    function fits() {
      return card.scrollHeight <= card.clientHeight && card.scrollWidth <= card.clientWidth;
    }
    var lo = 14, hi = 160, best = 14;
    while (lo <= hi) {
      var mid = (lo + hi) >> 1;
      setSize(q, a, mid);
      if (fits()) { best = mid; lo = mid + 1; } else { hi = mid - 1; }
    }
    setSize(q, a, best);
  }
  var COMICS = (window.COMICS || []);
  function sourceName(s){ return ({xkcd:"xkcd.com", smbc:"smbc-comics.com", poorlydrawnlines:"poorlydrawnlines.com"})[s] || s; }
  function showComic(){
    var c = COMICS[Math.floor(Math.random() * COMICS.length)];
    document.getElementById("card").style.display = "none";
    document.getElementById("comic").style.display = "flex";
    var _img = document.getElementById("comicImg");
    _img.onerror = function(){ document.getElementById("comic").style.display = "none"; document.getElementById("card").style.display = ""; render(); };
    _img.src = c.img;
    var label = (c.title ? c.title + " \u2014 " : "") + sourceName(c.source);
    document.getElementById("comicSrc").textContent = label;
  }
  function start(){
    if (COMICS.length && Math.random() < 0.5) { showComic(); return; }
    if (POEMS.length && (DATA.length === 0 || Math.random() < 0.5)) { renderPoem(); }
    else { render(); }
  }
  start();
  window.addEventListener("resize", fit);
</script>
</body>
</html>
